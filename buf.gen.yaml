version: v2
plugins:
  - local: [go, tool, protoc-gen-go]
    out: gen
    opt: paths=source_relative
  - local: [go, tool, protoc-gen-connect-go]
    out: gen
    opt:
      - paths=source_relative
  - local: [bun, --cwd, web/management, ./node_modules/@bufbuild/protoc-gen-es/bin/protoc-gen-es]
    out: web/management/src/gen
    opt:
      - target=ts
      - import_extension=none
  - local: [bun, --cwd, web/management, ./node_modules/@connectrpc/protoc-gen-connect-es/bin/protoc-gen-connect-es]
    out: web/management/src/gen
    opt:
      - target=ts
      - import_extension=none
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: p2pstream/gen
