  int64 id = 1;
  int64 agent_id = 2;
  string agent_public_id = 3;
  string agent_name = 4;
  int64 connected_at_unix_millis = 5;
  int64 disconnected_at_unix_millis = 6;
  int64 duration_millis = 7;
  bool active = 8;
}

message GetDashboardResponse {
  reserved 7;
  reserved "top_backends";

  GetStatusResponse status = 1;
  repeated DashboardWindowSummary windows = 2;
  AgentConnectionSummary agent_connections = 3;
  int64 retention_days = 4;
  int64 generated_at_unix_millis = 5;
  repeated DashboardProxyDimensionSummary top_listeners = 6;
  repeated DashboardProxyDimensionSummary top_routes = 8;
  repeated DashboardProxyDimensionSummary top_agents = 9;
  repeated DashboardProxyDimensionSummary top_error_kinds = 10;
  repeated DashboardProxyDimensionSummary status_classes = 11;
  repeated DashboardTrafficBucket traffic_buckets = 12;
  ManagementSecurity management_security = 13;
  repeated AgentUptimeSummary agent_uptime_summaries = 14;
  repeated AgentConnectionSession recent_agent_connections = 15;
  repeated DashboardProxyDimensionSummary top_route_targets = 16;
}

message GetDashboardDiagnosticsRequest {
  string window_label = 1;
  int64 sample_limit = 2;
}

message DashboardDiagnosticsOutcomeSummary {
  string label = 1;
  int64 since_unix_millis = 2;
  int64 requests = 3;
  int64 success = 4;
  int64 client_error = 5;
  int64 server_error = 6;
  int64 non_success = 7;
  int64 proxy_failure = 8;
  int64 avg_duration_ms = 9;
  int64 max_duration_ms = 10;
}

message DashboardStatusCodeSummary {
  int64 status_code = 1;
  int64 requests = 2;
  int64 success = 3;
  int64 client_error = 4;
  int64 server_error = 5;
  int64 proxy_failure = 6;
  int64 avg_duration_ms = 7;
  uint64 request_bytes = 8;
  uint64 response_bytes = 9;
}

message DashboardDiagnosticsSample {
  int64 occurred_at_unix_millis = 1;
  string method = 2;
  string host = 3;
  string path_prefix = 4;
  int64 status_code = 5;
  string error_kind = 6;
  string listener_label = 7;
  string route_label = 8;
  string route_target_label = 9;
  string agent_label = 10;
  int64 duration_ms = 11;
  uint64 request_bytes = 12;
  uint64 response_bytes = 13;
}

message GetDashboardDiagnosticsResponse {
  string label = 1;
  int64 since_unix_millis = 2;
  int64 generated_at_unix_millis = 3;
  DashboardDiagnosticsOutcomeSummary outcome = 4;
  repeated DashboardStatusCodeSummary status_codes = 5;
  repeated DashboardProxyDimensionSummary error_kinds = 6;
  repeated DashboardProxyDimensionSummary problem_listeners = 7;
  repeated DashboardProxyDimensionSummary problem_routes = 8;
  repeated DashboardProxyDimensionSummary problem_route_targets = 9;
  repeated DashboardProxyDimensionSummary problem_agents = 10;
  repeated DashboardDiagnosticsSample recent_samples = 11;
}

message TrafficTraceSettings {
  bool enabled = 1;
  TrafficTraceLevel level = 2;
  int64 updated_at_unix_millis = 3;
  uint64 emitted_events = 4;
  uint64 dropped_events = 5;
  int64 subscriber_count = 6;
}

message GetTrafficTraceSettingsRequest {
}

message GetTrafficTraceSettingsResponse {
  TrafficTraceSettings settings = 1;
}

message SetTrafficTraceSettingsRequest {
  bool enabled = 1;
  TrafficTraceLevel level = 2;
}

message SetTrafficTraceSettingsResponse {
  TrafficTraceSettings settings = 1;
}

message StreamTrafficTraceEventsRequest {
  bool replay_recent = 1;
  uint64 after_sequence = 2;
}

message TrafficTraceEvent {
  uint64 sequence = 1;
  string request_id = 2;
  TrafficTraceStage stage = 3;
  int64 occurred_at_unix_millis = 4;
  string method = 5;
  string host = 6;
  string path = 7;
  string query = 8;
  int64 listener_id = 9;
  string listener_name = 10;
  int64 route_id = 11;
  string route_label = 12;
  bool default_route = 13;
  reserved 14, 15, 16, 17;
  reserved "backend_id", "backend_name", "backend_type", "forward_mode";
  string target_origin = 18;
  int64 agent_id = 19;
  string agent_public_id = 20;
  string agent_name = 21;
  int64 status_code = 22;
  int64 duration_ms = 23;
  string error_kind = 24;
  map<string, string> request_headers = 25;
  map<string, string> response_headers = 26;
  uint64 request_bytes = 27;
  uint64 response_bytes = 28;
  map<string, string> debug_attributes = 29;
  int64 rate_limit_rule_id = 30;
  string rate_limit_rule_name = 31;
  PublicRateLimitAlgorithm rate_limit_algorithm = 32;
  int64 traffic_shaper_rule_id = 33;
  string traffic_shaper_rule_name = 34;
  PublicTrafficShaperBudgetScope traffic_shaper_budget_scope = 35;
  int64 traffic_shaper_upload_bytes_per_second = 36;
  int64 traffic_shaper_download_bytes_per_second = 37;
  int64 traffic_shaper_request_exempt_bytes = 38;
  int64 traffic_shaper_response_exempt_bytes = 39;
  int64 waf_rule_id = 40;
  string waf_rule_name = 41;
  PublicWafRuleAction waf_action = 42;
  PublicWafActivationMode waf_activation_mode = 43;
  bool waf_automatic_active = 44;
  string waf_challenge_kind = 45;
  int64 cache_rule_id = 46;
  string cache_rule_name = 47;
  string cache_status = 48;
  string cache_key_digest = 49;
  int64 route_target_id = 50;
  string route_target_name = 51;
  PublicRouteTargetType route_target_type = 52;
  PublicRouteTargetTransport route_target_transport = 53;
}

message StreamTrafficTraceEventsResponse {
  TrafficTraceSettings settings = 1;
  TrafficTraceEvent event = 2;
  uint64 subscriber_dropped_events = 3;
}

message GetSetupStateRequest {
}

message GetSetupStateResponse {
  bool setup_required = 1;
  bool setup_available = 2;
  int64 setup_expires_at_unix_millis = 3;
  string setup_unavailable_reason = 4;
}

message SetupAdminRequest {
  string username = 1;
  string password = 2;
  string setup_token = 3;
}

message SetupAdminResponse {
  User user = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
}

message LogoutRequest {
}

message LogoutResponse {
}

message GetCurrentUserRequest {
}

message GetCurrentUserResponse {
  User user = 1;
}

message StartProxyRequest {
}

message StartProxyResponse {
  ProxyStatus proxy = 1;
}

message StopProxyRequest {
}

message StopProxyResponse {
  ProxyStatus proxy = 1;
}

