  TRAFFIC_TRACE_LEVEL_UNSPECIFIED = 0;
  TRAFFIC_TRACE_LEVEL_BASIC = 1;
  TRAFFIC_TRACE_LEVEL_DETAILED = 2;
  TRAFFIC_TRACE_LEVEL_HEADERS = 3;
  TRAFFIC_TRACE_LEVEL_DEBUG = 4;
}

enum TrafficTraceStage {
  TRAFFIC_TRACE_STAGE_UNSPECIFIED = 0;
  TRAFFIC_TRACE_STAGE_RECEIVED = 1;
  TRAFFIC_TRACE_STAGE_ROUTE_RESOLVED = 2;
  TRAFFIC_TRACE_STAGE_BACKEND_SELECTED = 3;
  TRAFFIC_TRACE_STAGE_AGENT_SELECTED = 4;
  TRAFFIC_TRACE_STAGE_UPSTREAM_STARTED = 5;
  TRAFFIC_TRACE_STAGE_UPSTREAM_RESPONDED = 6;
  TRAFFIC_TRACE_STAGE_RESPONSE_SENT = 7;
  TRAFFIC_TRACE_STAGE_FAILED = 8;
  TRAFFIC_TRACE_STAGE_RATE_LIMITED = 9;
  TRAFFIC_TRACE_STAGE_TRAFFIC_SHAPER_SELECTED = 10;
  TRAFFIC_TRACE_STAGE_WAF_EVALUATED = 11;
  TRAFFIC_TRACE_STAGE_WAF_BLOCKED = 12;
  TRAFFIC_TRACE_STAGE_WAF_CAPTCHA_CHALLENGED = 13;
  TRAFFIC_TRACE_STAGE_WAF_CAPTCHA_VERIFIED = 14;
  TRAFFIC_TRACE_STAGE_WAF_WAITING_ROOM = 15;
  TRAFFIC_TRACE_STAGE_CACHE_LOOKUP = 16;
  TRAFFIC_TRACE_STAGE_CACHE_HIT = 17;
  TRAFFIC_TRACE_STAGE_CACHE_MISS = 18;
  TRAFFIC_TRACE_STAGE_CACHE_BYPASS = 19;
  TRAFFIC_TRACE_STAGE_CACHE_STORED = 20;
}

enum EnvironmentTransport {
  ENVIRONMENT_TRANSPORT_UNSPECIFIED = 0;
  ENVIRONMENT_TRANSPORT_DIRECT = 1;
  ENVIRONMENT_TRANSPORT_AGENT = 2;
}

enum EnvironmentTrustState {
  ENVIRONMENT_TRUST_STATE_UNSPECIFIED = 0;
  ENVIRONMENT_TRUST_STATE_UNTRUSTED = 1;
  ENVIRONMENT_TRUST_STATE_TRUSTED = 2;
  ENVIRONMENT_TRUST_STATE_CHANGED = 3;
  ENVIRONMENT_TRUST_STATE_EXPIRED = 4;
}

message AgentStatsRequest {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  string agent_public_id = 10;
  double cpu_percent = 11;
}

message AgentStatsResponse {
}

message User {
  int64 id = 1;
  string username = 2;
  UserRole role = 3;
}

message GetStatusRequest {
}

message AgentStatsSnapshot {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  int64 reported_at_unix_millis = 10;
  double cpu_percent = 11;
}

message GetStatusResponse {
  reserved 4;
  reserved "target_origin";

  bool proxy_running = 1;
  string proxy_last_error = 2;
  bool agent_connected = 3;
  AgentStatsSnapshot latest_agent_stats = 5;
  ProxyStatus proxy = 6;
}

message ProxyStatus {
  ProxyState state = 1;
  string last_error = 2;
  int64 started_at_unix_millis = 3;
  int64 stopped_at_unix_millis = 4;
  repeated PublicListenerStatus listeners = 5;
}

message PublicHeader {
  string name = 1;
  string value = 2;
}

message PublicRouteTargetUpstreamHeader {
  int64 id = 1;
  int64 target_id = 2;
  string name = 3;
  string value = 4;
  bool sensitive = 5;
  bool value_set = 6;
  int64 position = 7;
}

message PublicRouteTargetBasicAuth {
  bool enabled = 1;
  string username = 2;
  string password = 3;
  bool password_set = 4;
}

message PublicRouteTargetHealthCheck {
  bool enabled = 1;
  string method = 2;
  string path = 3;
  int64 interval_millis = 4;
  int64 timeout_millis = 5;
  int64 healthy_threshold = 6;
  int64 unhealthy_threshold = 7;
  int64 expected_status_min = 8;
  int64 expected_status_max = 9;
  PublicRouteTargetHealthStatus status = 10;
  int64 last_checked_at_unix_millis = 11;
  string last_error = 12;
  int64 passive_unhealthy_until_unix_millis = 13;
}

message PublicRouteTargetAgentHealth {
  PublicRouteTargetHealthStatus status = 1;
  bool connected = 2;
  bool available = 3;
  int64 last_checked_at_unix_millis = 4;
  string last_error = 5;
  int64 passive_unhealthy_until_unix_millis = 6;
  int64 active_requests = 7;
}

message Agent {
  int64 id = 1;
  string public_id = 2;
  string name = 3;
  bool enabled = 4;
  bool connected = 5;
  int64 active_requests = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  int64 last_connected_at_unix_millis = 9;
  int64 last_disconnected_at_unix_millis = 10;
  AgentStatsSnapshot latest_stats = 11;
  map<string, string> labels = 12;
}

message PublicAgentSelector {
  map<string, string> match_labels = 1;
}

message PublicRouteTargetHealth {
  PublicRouteTargetHealthStatus status = 1;
  bool available = 2;
  bool connected = 3;
  int64 agent_id = 4;
  int64 last_checked_at_unix_millis = 5;
  string last_error = 6;
  int64 passive_unhealthy_until_unix_millis = 7;
  int64 active_requests = 8;
}

message PublicRouteTarget {
  int64 id = 1;
  int64 route_id = 2;
  string name = 3;
  int64 position = 4;
  int64 priority_group = 5;
  int64 weight = 6;
  bool enabled = 7;
  PublicRouteTargetType target_type = 8;
  string url = 9;
  PublicRouteTargetTransport transport = 10;
  PublicAgentSelector agent_selector = 11;
  PublicRouteTargetLoadBalancing agent_load_balancing = 12;
  bool tls_skip_verify = 13;
  int64 upstream_response_header_timeout_millis = 14;
  repeated PublicRouteTargetUpstreamHeader upstream_request_headers = 15;
  PublicRouteTargetBasicAuth upstream_basic_auth = 16;
  PublicRouteTargetHealthCheck health_check = 17;
  int64 static_status_code = 18;
  repeated PublicHeader static_response_headers = 19;
  string static_response_body = 20;
  PublicResponseBodyMode static_response_body_mode = 21;
  int64 static_response_template_id = 22;
  PublicRouteTargetHealth health = 23;
}

message PublicListener {
  reserved 7;
  reserved "default_backend_id";

  int64 id = 1;
  string name = 2;
  string bind_address = 3;
  int64 port = 4;
  PublicListenerProtocol protocol = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicRoute {
  reserved 6, 16, 17, 18;
  reserved "backend_id", "load_balancing", "backend_assignments", "fallback_backend_id";

  int64 id = 1;
  int64 listener_id = 2;
  int64 priority = 3;
  string host_pattern = 4;
  string path_prefix = 5;
  bool enabled = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
  PublicRouteAction action = 10;
  PublicRouteRedirectTargetMode redirect_target_mode = 11;
  string redirect_target = 12;
  int64 redirect_status_code = 13;
  bool redirect_preserve_path_suffix = 14;
  bool redirect_preserve_query = 15;
  PublicRouteTargetLoadBalancing target_load_balancing = 19;
  bool is_default = 20;
  repeated PublicRouteTarget targets = 21;
  PublicRoutePathSecurityMode path_security_mode = 22;
}

message PublicTlsCertificate {
  int64 id = 1;
  int64 listener_id = 2;
  string hostname_pattern = 3;
  string cert_path = 4;
  string key_path = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  PublicTlsCertificateSource source = 9;
  PublicAcmeChallengeType acme_challenge_type = 10;
  PublicAcmeCa acme_ca = 11;
  string acme_email = 12;
  int64 dns_credential_id = 13;
  PublicTlsCertificateStatus status = 14;
  string last_error = 15;
  int64 issued_at_unix_millis = 16;
  int64 expires_at_unix_millis = 17;
  int64 next_renewal_at_unix_millis = 18;
  int64 last_renewal_attempt_at_unix_millis = 19;
}

message PublicTlsDnsCredential {
  int64 id = 1;
  string name = 2;
  PublicDnsProvider provider = 3;
  string cloudflare_zone_id = 4;
  bool api_token_set = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
}

message PublicRateLimitKeyPart {
  PublicRateLimitKeySource source = 1;
  string name = 2;
}

message PublicPolicyMatchRule {
  string cel_expression = 1;
  PublicPolicyMatchBuilder builder = 2;
}

message PublicPolicyMatchBuilder {
  PublicPolicyMatchGroup root = 1;
}

message PublicPolicyMatchGroup {
  PublicPolicyMatchBooleanOperator operator = 1;
  repeated PublicPolicyMatchCondition conditions = 2;
  repeated PublicPolicyMatchGroup groups = 3;
  bool negated = 4;
}

message PublicPolicyMatchCondition {
  PublicPolicyMatchField field = 1;
  string name = 2;
  PublicPolicyMatchConditionOperator operator = 3;
  repeated string values = 4;
  bool negated = 5;
}

message PublicRateLimitResponseHeader {
  string name = 1;
  string value = 2;
}

message PublicRateLimitRule {
  reserved 9;
  reserved "match";

  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicRateLimitAlgorithm algorithm = 5;
  int64 limit = 6;
  int64 window_millis = 7;
  int64 burst = 8;
  repeated PublicRateLimitKeyPart key_parts = 10;
  int64 response_status_code = 11;
  string response_body = 12;
  string response_content_type = 13;
  repeated PublicRateLimitResponseHeader response_headers = 14;
  int64 created_at_unix_millis = 15;
  int64 updated_at_unix_millis = 16;
  PublicResponseBodyMode response_body_mode = 17;
  int64 response_body_template_id = 18;
  PublicPolicyMatchRule match_rule = 19;
}

message PublicTrafficShaperRule {
  reserved 11;
  reserved "match";

  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicTrafficShaperBudgetScope budget_scope = 5;
  int64 upload_bytes_per_second = 6;
  int64 download_bytes_per_second = 7;
  int64 burst_bytes = 8;
  int64 request_exempt_bytes = 9;
  int64 response_exempt_bytes = 10;
  repeated PublicRateLimitKeyPart key_parts = 12;
  int64 created_at_unix_millis = 13;
  int64 updated_at_unix_millis = 14;
  PublicPolicyMatchRule match_rule = 15;
}

message PublicWafCaptchaProvider {
  int64 id = 1;
  string name = 2;
  PublicWafCaptchaProviderType provider_type = 3;
  string site_key = 4;
  string secret_key = 5;
  bool secret_key_set = 6;
  bool enabled = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicWafTriggerConfig {
  int64 request_window_millis = 1;
  int64 minimum_request_rate = 2;
  double traffic_spike_multiplier = 3;
  int64 proxy_active_requests = 4;
  int64 route_target_active_requests = 5;
  int64 agent_active_requests = 6;
  double server_cpu_percent = 7;
  double agent_cpu_percent = 8;
  int64 minimum_active_millis = 9;
  int64 quiet_period_millis = 10;
}

message PublicWafWaitingRoomConfig {
  int64 max_admitted_sessions = 1;
  int64 admission_rate_per_second = 2;
  int64 admission_session_ttl_millis = 3;
  int64 queue_poll_interval_millis = 4;
  int64 queue_timeout_millis = 5;
  string page_title = 6;
  string page_body = 7;
}

message PublicWafRule {
  reserved 7;
  reserved "match";

  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicWafRuleAction action = 5;
  PublicWafActivationMode activation_mode = 6;
  repeated PublicRateLimitKeyPart key_parts = 8;
  int64 captcha_provider_id = 9;
  int64 captcha_pass_ttl_millis = 10;
  PublicWafWaitingRoomConfig waiting_room = 11;
  PublicWafTriggerConfig triggers = 12;
  int64 block_response_status_code = 13;
  string block_response_body = 14;
  string block_response_content_type = 15;
  repeated PublicRateLimitResponseHeader block_response_headers = 16;
  int64 created_at_unix_millis = 17;
  int64 updated_at_unix_millis = 18;
  PublicResponseBodyMode block_response_body_mode = 19;
  int64 block_response_template_id = 20;
  int64 captcha_page_template_id = 21;
  int64 waiting_room_page_template_id = 22;
  PublicPolicyMatchRule match_rule = 23;
}

message PublicResponseTemplate {
  int64 id = 1;
  string name = 2;
  PublicResponseTemplateKind kind = 3;
  string description = 4;
  string content_type = 5;
  string body = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
}

message PublicCacheSettings {
  bool enabled = 1;
  int64 max_disk_bytes = 2;
  int64 max_memory_bytes = 3;
  int64 memory_hot_object_max_bytes = 4;
  int64 max_entries = 5;
  int64 cleanup_interval_millis = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
}

message PublicCacheRule {
  reserved 5, 7;
  reserved "match", "backend_ids";

  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  repeated int64 route_ids = 6;
  PublicCacheScope scope = 8;
  PublicCacheTtlMode ttl_mode = 9;
  int64 ttl_millis = 10;
  PublicCacheQueryMode query_mode = 11;
  repeated string query_params = 12;
  repeated string vary_headers = 13;
  repeated int64 cache_status_codes = 14;
  int64 max_object_bytes = 15;
  bool add_cache_status_header = 16;
  int64 created_at_unix_millis = 17;
  int64 updated_at_unix_millis = 18;
