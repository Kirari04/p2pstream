syntax = "proto3";

package p2pstream.v1;

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
}

enum ProxyState {
  PROXY_STATE_UNSPECIFIED = 0;
  PROXY_STATE_STOPPED = 1;
  PROXY_STATE_STARTING = 2;
  PROXY_STATE_RUNNING = 3;
  PROXY_STATE_STOPPING = 4;
  PROXY_STATE_ERROR = 5;
}

enum PublicListenerProtocol {
  PUBLIC_LISTENER_PROTOCOL_UNSPECIFIED = 0;
  PUBLIC_LISTENER_PROTOCOL_HTTP = 1;
  PUBLIC_LISTENER_PROTOCOL_HTTPS = 2;
}

enum PublicBackendType {
  PUBLIC_BACKEND_TYPE_UNSPECIFIED = 0;
  PUBLIC_BACKEND_TYPE_PROXY_FORWARD = 1;
  PUBLIC_BACKEND_TYPE_STATIC = 2;
}

enum PublicBackendForwardMode {
  PUBLIC_BACKEND_FORWARD_MODE_UNSPECIFIED = 0;
  PUBLIC_BACKEND_FORWARD_MODE_DIRECT = 1;
  PUBLIC_BACKEND_FORWARD_MODE_AGENT_POOL = 2;
}

enum PublicBackendLoadBalancing {
  PUBLIC_BACKEND_LOAD_BALANCING_UNSPECIFIED = 0;
  PUBLIC_BACKEND_LOAD_BALANCING_ROUND_ROBIN = 1;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_ROUND_ROBIN = 2;
  PUBLIC_BACKEND_LOAD_BALANCING_RANDOM = 3;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_RANDOM = 4;
  PUBLIC_BACKEND_LOAD_BALANCING_LEAST_ACTIVE_REQUESTS = 5;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_LEAST_ACTIVE_REQUESTS = 6;
}

enum PublicBackendHealthStatus {
  PUBLIC_BACKEND_HEALTH_STATUS_UNSPECIFIED = 0;
  PUBLIC_BACKEND_HEALTH_STATUS_UNKNOWN = 1;
  PUBLIC_BACKEND_HEALTH_STATUS_HEALTHY = 2;
  PUBLIC_BACKEND_HEALTH_STATUS_UNHEALTHY = 3;
  PUBLIC_BACKEND_HEALTH_STATUS_DISABLED = 4;
}

enum PublicRouteAction {
  PUBLIC_ROUTE_ACTION_UNSPECIFIED = 0;
  PUBLIC_ROUTE_ACTION_FORWARD = 1;
  PUBLIC_ROUTE_ACTION_REDIRECT = 2;
}

enum PublicRouteRedirectTargetMode {
  PUBLIC_ROUTE_REDIRECT_TARGET_MODE_UNSPECIFIED = 0;
  PUBLIC_ROUTE_REDIRECT_TARGET_MODE_SAME_HOST_PATH = 1;
  PUBLIC_ROUTE_REDIRECT_TARGET_MODE_EXTERNAL_ORIGIN_KEEP_PATH = 2;
  PUBLIC_ROUTE_REDIRECT_TARGET_MODE_ABSOLUTE_URL = 3;
}

enum PublicRateLimitAlgorithm {
  PUBLIC_RATE_LIMIT_ALGORITHM_UNSPECIFIED = 0;
  PUBLIC_RATE_LIMIT_ALGORITHM_FIXED_WINDOW = 1;
  PUBLIC_RATE_LIMIT_ALGORITHM_SLIDING_WINDOW = 2;
  PUBLIC_RATE_LIMIT_ALGORITHM_TOKEN_BUCKET = 3;
  PUBLIC_RATE_LIMIT_ALGORITHM_LEAKY_BUCKET = 4;
}

enum PublicRateLimitKeySource {
  PUBLIC_RATE_LIMIT_KEY_SOURCE_UNSPECIFIED = 0;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_REMOTE_IP = 1;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_HOST = 2;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_METHOD = 3;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_PATH = 4;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_PROTOCOL = 5;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_HEADER = 6;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_COOKIE = 7;
  PUBLIC_RATE_LIMIT_KEY_SOURCE_QUERY_PARAM = 8;
}

enum PublicRateLimitMatchOperator {
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_UNSPECIFIED = 0;
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_PRESENT = 1;
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_EQUALS = 2;
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_PREFIX = 3;
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_SUFFIX = 4;
  PUBLIC_RATE_LIMIT_MATCH_OPERATOR_CONTAINS = 5;
}

enum PublicTrafficShaperBudgetScope {
  PUBLIC_TRAFFIC_SHAPER_BUDGET_SCOPE_UNSPECIFIED = 0;
  PUBLIC_TRAFFIC_SHAPER_BUDGET_SCOPE_PER_KEY = 1;
  PUBLIC_TRAFFIC_SHAPER_BUDGET_SCOPE_PER_REQUEST = 2;
}

enum PublicWafCaptchaProviderType {
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_UNSPECIFIED = 0;
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_TURNSTILE = 1;
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_HCAPTCHA = 2;
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_RECAPTCHA_V2 = 3;
}

enum PublicWafRuleAction {
  PUBLIC_WAF_RULE_ACTION_UNSPECIFIED = 0;
  PUBLIC_WAF_RULE_ACTION_BLOCK = 1;
  PUBLIC_WAF_RULE_ACTION_CAPTCHA = 2;
  PUBLIC_WAF_RULE_ACTION_WAITING_ROOM = 3;
}

enum PublicWafActivationMode {
  PUBLIC_WAF_ACTIVATION_MODE_UNSPECIFIED = 0;
  PUBLIC_WAF_ACTIVATION_MODE_ALWAYS = 1;
  PUBLIC_WAF_ACTIVATION_MODE_AUTOMATIC = 2;
}

enum PublicTlsCertificateSource {
  PUBLIC_TLS_CERTIFICATE_SOURCE_UNSPECIFIED = 0;
  PUBLIC_TLS_CERTIFICATE_SOURCE_MANUAL = 1;
  PUBLIC_TLS_CERTIFICATE_SOURCE_ACME = 2;
}

enum PublicAcmeChallengeType {
  PUBLIC_ACME_CHALLENGE_TYPE_UNSPECIFIED = 0;
  PUBLIC_ACME_CHALLENGE_TYPE_HTTP_01 = 1;
  PUBLIC_ACME_CHALLENGE_TYPE_TLS_ALPN_01 = 2;
  PUBLIC_ACME_CHALLENGE_TYPE_DNS_01 = 3;
}

enum PublicAcmeCa {
  PUBLIC_ACME_CA_UNSPECIFIED = 0;
  PUBLIC_ACME_CA_LETS_ENCRYPT_PRODUCTION = 1;
  PUBLIC_ACME_CA_LETS_ENCRYPT_STAGING = 2;
}

enum PublicDnsProvider {
  PUBLIC_DNS_PROVIDER_UNSPECIFIED = 0;
  PUBLIC_DNS_PROVIDER_CLOUDFLARE = 1;
}

enum PublicTlsCertificateStatus {
  PUBLIC_TLS_CERTIFICATE_STATUS_UNSPECIFIED = 0;
  PUBLIC_TLS_CERTIFICATE_STATUS_PENDING = 1;
  PUBLIC_TLS_CERTIFICATE_STATUS_READY = 2;
  PUBLIC_TLS_CERTIFICATE_STATUS_RENEWING = 3;
  PUBLIC_TLS_CERTIFICATE_STATUS_ERROR = 4;
}

enum TrafficTraceLevel {
  TRAFFIC_TRACE_LEVEL_UNSPECIFIED = 0;
  TRAFFIC_TRACE_LEVEL_BASIC = 1;
  TRAFFIC_TRACE_LEVEL_DETAILED = 2;
  TRAFFIC_TRACE_LEVEL_HEADERS = 3;
  TRAFFIC_TRACE_LEVEL_DEBUG = 4;
}

enum TrafficTraceStage {
  TRAFFIC_TRACE_STAGE_UNSPECIFIED = 0;
  TRAFFIC_TRACE_STAGE_RECEIVED = 1;
  TRAFFIC_TRACE_STAGE_ROUTE_RESOLVED = 2;
  TRAFFIC_TRACE_STAGE_BACKEND_SELECTED = 3;
  TRAFFIC_TRACE_STAGE_AGENT_SELECTED = 4;
  TRAFFIC_TRACE_STAGE_UPSTREAM_STARTED = 5;
  TRAFFIC_TRACE_STAGE_UPSTREAM_RESPONDED = 6;
  TRAFFIC_TRACE_STAGE_RESPONSE_SENT = 7;
  TRAFFIC_TRACE_STAGE_FAILED = 8;
  TRAFFIC_TRACE_STAGE_RATE_LIMITED = 9;
  TRAFFIC_TRACE_STAGE_TRAFFIC_SHAPER_SELECTED = 10;
  TRAFFIC_TRACE_STAGE_WAF_EVALUATED = 11;
  TRAFFIC_TRACE_STAGE_WAF_BLOCKED = 12;
  TRAFFIC_TRACE_STAGE_WAF_CAPTCHA_CHALLENGED = 13;
  TRAFFIC_TRACE_STAGE_WAF_CAPTCHA_VERIFIED = 14;
  TRAFFIC_TRACE_STAGE_WAF_WAITING_ROOM = 15;
}

message AgentStatsRequest {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  string agent_public_id = 10;
  double cpu_percent = 11;
}

message AgentStatsResponse {
}

message User {
  int64 id = 1;
  string username = 2;
  UserRole role = 3;
}

message GetStatusRequest {
}

message AgentStatsSnapshot {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  int64 reported_at_unix_millis = 10;
  double cpu_percent = 11;
}

message GetStatusResponse {
  reserved 4;
  reserved "target_origin";

  bool proxy_running = 1;
  string proxy_last_error = 2;
  bool agent_connected = 3;
  AgentStatsSnapshot latest_agent_stats = 5;
  ProxyStatus proxy = 6;
}

message ProxyStatus {
  ProxyState state = 1;
  string last_error = 2;
  int64 started_at_unix_millis = 3;
  int64 stopped_at_unix_millis = 4;
  repeated PublicListenerStatus listeners = 5;
}

message PublicBackend {
  int64 id = 1;
  string name = 2;
  string target_origin = 3;
  bool enabled = 4;
  int64 created_at_unix_millis = 5;
  int64 updated_at_unix_millis = 6;
  PublicBackendType backend_type = 7;
  bool tls_skip_verify = 8;
  int64 static_status_code = 9;
  repeated PublicHeader static_response_headers = 10;
  string static_response_body = 11;
  PublicBackendForwardMode forward_mode = 12;
  PublicBackendLoadBalancing load_balancing = 13;
  repeated PublicBackendAgent agent_assignments = 14;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 15;
  PublicBackendBasicAuth upstream_basic_auth = 16;
  PublicBackendHealthCheck health_check = 17;
}

message PublicHeader {
  string name = 1;
  string value = 2;
}

message PublicBackendUpstreamHeader {
  int64 id = 1;
  int64 backend_id = 2;
  string name = 3;
  string value = 4;
  bool sensitive = 5;
  bool value_set = 6;
  int64 position = 7;
}

message PublicBackendBasicAuth {
  bool enabled = 1;
  string username = 2;
  string password = 3;
  bool password_set = 4;
}

message PublicBackendHealthCheck {
  bool enabled = 1;
  string method = 2;
  string path = 3;
  int64 interval_millis = 4;
  int64 timeout_millis = 5;
  int64 healthy_threshold = 6;
  int64 unhealthy_threshold = 7;
  int64 expected_status_min = 8;
  int64 expected_status_max = 9;
  PublicBackendHealthStatus status = 10;
  int64 last_checked_at_unix_millis = 11;
  string last_error = 12;
  int64 passive_unhealthy_until_unix_millis = 13;
}

message Agent {
  int64 id = 1;
  string public_id = 2;
  string name = 3;
  bool enabled = 4;
  bool connected = 5;
  int64 active_requests = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  int64 last_connected_at_unix_millis = 9;
  int64 last_disconnected_at_unix_millis = 10;
  AgentStatsSnapshot latest_stats = 11;
}

message PublicBackendAgent {
  int64 backend_id = 1;
  int64 agent_id = 2;
  int64 position = 3;
  int64 weight = 4;
  bool enabled = 5;
}

message PublicRouteBackend {
  int64 route_id = 1;
  int64 backend_id = 2;
  int64 position = 3;
  int64 weight = 4;
  bool enabled = 5;
}

message PublicListener {
  int64 id = 1;
  string name = 2;
  string bind_address = 3;
  int64 port = 4;
  PublicListenerProtocol protocol = 5;
  bool enabled = 6;
  int64 default_backend_id = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicRoute {
  int64 id = 1;
  int64 listener_id = 2;
  int64 priority = 3;
  string host_pattern = 4;
  string path_prefix = 5;
  int64 backend_id = 6;
  bool enabled = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
  PublicRouteAction action = 10;
  PublicRouteRedirectTargetMode redirect_target_mode = 11;
  string redirect_target = 12;
  int64 redirect_status_code = 13;
  bool redirect_preserve_path_suffix = 14;
  bool redirect_preserve_query = 15;
  PublicBackendLoadBalancing load_balancing = 16;
  repeated PublicRouteBackend backend_assignments = 17;
  int64 fallback_backend_id = 18;
}

message PublicTlsCertificate {
  int64 id = 1;
  int64 listener_id = 2;
  string hostname_pattern = 3;
  string cert_path = 4;
  string key_path = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  PublicTlsCertificateSource source = 9;
  PublicAcmeChallengeType acme_challenge_type = 10;
  PublicAcmeCa acme_ca = 11;
  string acme_email = 12;
  int64 dns_credential_id = 13;
  PublicTlsCertificateStatus status = 14;
  string last_error = 15;
  int64 issued_at_unix_millis = 16;
  int64 expires_at_unix_millis = 17;
  int64 next_renewal_at_unix_millis = 18;
  int64 last_renewal_attempt_at_unix_millis = 19;
}

message PublicTlsDnsCredential {
  int64 id = 1;
  string name = 2;
  PublicDnsProvider provider = 3;
  string cloudflare_zone_id = 4;
  bool api_token_set = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
}

message PublicRateLimitKeyPart {
  PublicRateLimitKeySource source = 1;
  string name = 2;
}

message PublicRateLimitValueMatcher {
  string name = 1;
  PublicRateLimitMatchOperator operator = 2;
  string value = 3;
}

message PublicRateLimitMatch {
  repeated string methods = 1;
  repeated PublicListenerProtocol protocols = 2;
  repeated string host_patterns = 3;
  repeated string path_prefixes = 4;
  repeated PublicRateLimitValueMatcher headers = 5;
  repeated PublicRateLimitValueMatcher cookies = 6;
  repeated PublicRateLimitValueMatcher query_params = 7;
}

message PublicRateLimitResponseHeader {
  string name = 1;
  string value = 2;
}

message PublicRateLimitRule {
  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicRateLimitAlgorithm algorithm = 5;
  int64 limit = 6;
  int64 window_millis = 7;
  int64 burst = 8;
  PublicRateLimitMatch match = 9;
  repeated PublicRateLimitKeyPart key_parts = 10;
  int64 response_status_code = 11;
  string response_body = 12;
  string response_content_type = 13;
  repeated PublicRateLimitResponseHeader response_headers = 14;
  int64 created_at_unix_millis = 15;
  int64 updated_at_unix_millis = 16;
}

message PublicTrafficShaperRule {
  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicTrafficShaperBudgetScope budget_scope = 5;
  int64 upload_bytes_per_second = 6;
  int64 download_bytes_per_second = 7;
  int64 burst_bytes = 8;
  int64 request_exempt_bytes = 9;
  int64 response_exempt_bytes = 10;
  PublicRateLimitMatch match = 11;
  repeated PublicRateLimitKeyPart key_parts = 12;
  int64 created_at_unix_millis = 13;
  int64 updated_at_unix_millis = 14;
}

message PublicWafCaptchaProvider {
  int64 id = 1;
  string name = 2;
  PublicWafCaptchaProviderType provider_type = 3;
  string site_key = 4;
  string secret_key = 5;
  bool secret_key_set = 6;
  bool enabled = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicWafTriggerConfig {
  int64 request_window_millis = 1;
  int64 minimum_request_rate = 2;
  double traffic_spike_multiplier = 3;
  int64 proxy_active_requests = 4;
  int64 backend_active_requests = 5;
  int64 agent_active_requests = 6;
  double server_cpu_percent = 7;
  double agent_cpu_percent = 8;
  int64 minimum_active_millis = 9;
  int64 quiet_period_millis = 10;
}

message PublicWafWaitingRoomConfig {
  int64 max_admitted_sessions = 1;
  int64 admission_rate_per_second = 2;
  int64 admission_session_ttl_millis = 3;
  int64 queue_poll_interval_millis = 4;
  int64 queue_timeout_millis = 5;
  string page_title = 6;
  string page_body = 7;
}

message PublicWafRule {
  int64 id = 1;
  string name = 2;
  int64 priority = 3;
  bool enabled = 4;
  PublicWafRuleAction action = 5;
  PublicWafActivationMode activation_mode = 6;
  PublicRateLimitMatch match = 7;
  repeated PublicRateLimitKeyPart key_parts = 8;
  int64 captcha_provider_id = 9;
  int64 captcha_pass_ttl_millis = 10;
  PublicWafWaitingRoomConfig waiting_room = 11;
  PublicWafTriggerConfig triggers = 12;
  int64 block_response_status_code = 13;
  string block_response_body = 14;
  string block_response_content_type = 15;
  repeated PublicRateLimitResponseHeader block_response_headers = 16;
  int64 created_at_unix_millis = 17;
  int64 updated_at_unix_millis = 18;
}

message PublicListenerStatus {
  int64 listener_id = 1;
  ProxyState state = 2;
  string last_error = 3;
  int64 started_at_unix_millis = 4;
  int64 stopped_at_unix_millis = 5;
  string bound_address = 6;
  bool running = 7;
  bool disabled = 8;
}

message GetPublicProxyConfigRequest {
}

message GetPublicProxyConfigResponse {
  repeated PublicBackend backends = 1;
  repeated PublicListener listeners = 2;
  repeated PublicRoute routes = 3;
  repeated PublicTlsCertificate tls_certificates = 4;
  ProxyStatus proxy = 5;
  repeated Agent agents = 6;
  repeated PublicBackendAgent backend_agents = 7;
  repeated PublicRateLimitRule rate_limit_rules = 8;
  repeated PublicTrafficShaperRule traffic_shaper_rules = 9;
  repeated PublicTlsDnsCredential tls_dns_credentials = 10;
  repeated PublicRouteBackend route_backends = 11;
  repeated PublicWafCaptchaProvider waf_captcha_providers = 12;
  repeated PublicWafRule waf_rules = 13;
}

message CreatePublicBackendRequest {
  string name = 1;
  string target_origin = 2;
  bool enabled = 3;
  PublicBackendType backend_type = 4;
  bool tls_skip_verify = 5;
  int64 static_status_code = 6;
  repeated PublicHeader static_response_headers = 7;
  string static_response_body = 8;
  PublicBackendForwardMode forward_mode = 9;
  PublicBackendLoadBalancing load_balancing = 10;
  repeated PublicBackendAgent agent_assignments = 11;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 12;
  PublicBackendBasicAuth upstream_basic_auth = 13;
  PublicBackendHealthCheck health_check = 14;
}

message CreatePublicBackendResponse {
  PublicBackend backend = 1;
}

message UpdatePublicBackendRequest {
  int64 id = 1;
  string name = 2;
  string target_origin = 3;
  bool enabled = 4;
  PublicBackendType backend_type = 5;
  bool tls_skip_verify = 6;
  int64 static_status_code = 7;
  repeated PublicHeader static_response_headers = 8;
  string static_response_body = 9;
  PublicBackendForwardMode forward_mode = 10;
  PublicBackendLoadBalancing load_balancing = 11;
  repeated PublicBackendAgent agent_assignments = 12;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 13;
  PublicBackendBasicAuth upstream_basic_auth = 14;
  PublicBackendHealthCheck health_check = 15;
}

message UpdatePublicBackendResponse {
  PublicBackend backend = 1;
}

message DeletePublicBackendRequest {
  int64 id = 1;
}

message DeletePublicBackendResponse {
}

message CreateAgentRequest {
  string public_id = 1 [deprecated = true];
  string name = 2;
  bool enabled = 3;
}

message CreateAgentResponse {
  Agent agent = 1;
  string token = 2;
}

message UpdateAgentRequest {
  int64 id = 1;
  string public_id = 2 [deprecated = true];
  string name = 3;
  bool enabled = 4;
}

message UpdateAgentResponse {
  Agent agent = 1;
}

message DeleteAgentRequest {
  int64 id = 1;
}

message DeleteAgentResponse {
}

message RotateAgentTokenRequest {
  int64 id = 1;
}

message RotateAgentTokenResponse {
  Agent agent = 1;
  string token = 2;
}

message CreatePublicListenerRequest {
  string name = 1;
  string bind_address = 2;
  int64 port = 3;
  PublicListenerProtocol protocol = 4;
  bool enabled = 5;
  int64 default_backend_id = 6;
}

message CreatePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message UpdatePublicListenerRequest {
  int64 id = 1;
  string name = 2;
  string bind_address = 3;
  int64 port = 4;
  PublicListenerProtocol protocol = 5;
  bool enabled = 6;
  int64 default_backend_id = 7;
}

message UpdatePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message DeletePublicListenerRequest {
  int64 id = 1;
}

message DeletePublicListenerResponse {
}

message EnablePublicListenerRequest {
  int64 id = 1;
}

message EnablePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message DisablePublicListenerRequest {
  int64 id = 1;
}

message DisablePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message StartPublicListenerRequest {
  int64 id = 1;
}

message StartPublicListenerResponse {
  PublicListenerStatus status = 1;
  ProxyStatus proxy = 2;
}

message StopPublicListenerRequest {
  int64 id = 1;
}

message StopPublicListenerResponse {
  PublicListenerStatus status = 1;
  ProxyStatus proxy = 2;
}

message CreatePublicRouteRequest {
  int64 listener_id = 1;
  int64 priority = 2;
  string host_pattern = 3;
  string path_prefix = 4;
  int64 backend_id = 5;
  bool enabled = 6;
  PublicRouteAction action = 10;
  PublicRouteRedirectTargetMode redirect_target_mode = 11;
  string redirect_target = 12;
  int64 redirect_status_code = 13;
  bool redirect_preserve_path_suffix = 14;
  bool redirect_preserve_query = 15;
  PublicBackendLoadBalancing load_balancing = 16;
  repeated PublicRouteBackend backend_assignments = 17;
  int64 fallback_backend_id = 18;
}

message CreatePublicRouteResponse {
  PublicRoute route = 1;
}

message UpdatePublicRouteRequest {
  int64 id = 1;
  int64 listener_id = 2;
  int64 priority = 3;
  string host_pattern = 4;
  string path_prefix = 5;
  int64 backend_id = 6;
  bool enabled = 7;
  PublicRouteAction action = 10;
  PublicRouteRedirectTargetMode redirect_target_mode = 11;
  string redirect_target = 12;
  int64 redirect_status_code = 13;
  bool redirect_preserve_path_suffix = 14;
  bool redirect_preserve_query = 15;
  PublicBackendLoadBalancing load_balancing = 16;
  repeated PublicRouteBackend backend_assignments = 17;
  int64 fallback_backend_id = 18;
}

message UpdatePublicRouteResponse {
  PublicRoute route = 1;
}

message DeletePublicRouteRequest {
  int64 id = 1;
}

message DeletePublicRouteResponse {
}

message CreatePublicTlsDnsCredentialRequest {
  string name = 1;
  PublicDnsProvider provider = 2;
  string cloudflare_zone_id = 3;
  string api_token = 4;
  bool enabled = 5;
}

message CreatePublicTlsDnsCredentialResponse {
  PublicTlsDnsCredential credential = 1;
}

message UpdatePublicTlsDnsCredentialRequest {
  int64 id = 1;
  string name = 2;
  PublicDnsProvider provider = 3;
  string cloudflare_zone_id = 4;
  string api_token = 5;
  bool api_token_set = 6;
  bool enabled = 7;
}

message UpdatePublicTlsDnsCredentialResponse {
  PublicTlsDnsCredential credential = 1;
}

message DeletePublicTlsDnsCredentialRequest {
  int64 id = 1;
}

message DeletePublicTlsDnsCredentialResponse {
}

message CreatePublicTlsCertificateRequest {
  int64 listener_id = 1;
  string hostname_pattern = 2;
  string cert_path = 3;
  string key_path = 4;
  bool enabled = 5;
  bytes cert_pem = 6;
  bytes key_pem = 7;
  PublicTlsCertificateSource source = 8;
  PublicAcmeChallengeType acme_challenge_type = 9;
