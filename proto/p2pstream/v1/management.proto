  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_TURNSTILE = 1;
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_HCAPTCHA = 2;
  PUBLIC_WAF_CAPTCHA_PROVIDER_TYPE_RECAPTCHA_V2 = 3;
}

enum PublicWafRuleAction {
  PUBLIC_WAF_RULE_ACTION_UNSPECIFIED = 0;
  PUBLIC_WAF_RULE_ACTION_BLOCK = 1;
  PUBLIC_WAF_RULE_ACTION_CAPTCHA = 2;
  PUBLIC_WAF_RULE_ACTION_WAITING_ROOM = 3;
}

enum PublicWafActivationMode {
  PUBLIC_WAF_ACTIVATION_MODE_UNSPECIFIED = 0;
  PUBLIC_WAF_ACTIVATION_MODE_ALWAYS = 1;
  PUBLIC_WAF_ACTIVATION_MODE_AUTOMATIC = 2;
}

enum PublicCacheTtlMode {
  PUBLIC_CACHE_TTL_MODE_UNSPECIFIED = 0;
  PUBLIC_CACHE_TTL_MODE_FIXED = 1;
  PUBLIC_CACHE_TTL_MODE_ORIGIN = 2;
}

enum PublicCacheQueryMode {
  PUBLIC_CACHE_QUERY_MODE_UNSPECIFIED = 0;
  PUBLIC_CACHE_QUERY_MODE_FULL = 1;
  PUBLIC_CACHE_QUERY_MODE_IGNORE = 2;
  PUBLIC_CACHE_QUERY_MODE_ALLOWLIST = 3;
  PUBLIC_CACHE_QUERY_MODE_DENYLIST = 4;
}

enum PublicCacheScope {
  PUBLIC_CACHE_SCOPE_UNSPECIFIED = 0;
  PUBLIC_CACHE_SCOPE_SELECTED_BACKEND = 1;
  PUBLIC_CACHE_SCOPE_ROUTE = 2;
}

enum PublicTlsCertificateSource {
  PUBLIC_TLS_CERTIFICATE_SOURCE_UNSPECIFIED = 0;
  PUBLIC_TLS_CERTIFICATE_SOURCE_MANUAL = 1;
  PUBLIC_TLS_CERTIFICATE_SOURCE_ACME = 2;
}

