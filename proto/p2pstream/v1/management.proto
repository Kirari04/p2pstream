syntax = "proto3";

package p2pstream.v1;

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
}

enum ProxyState {
  PROXY_STATE_UNSPECIFIED = 0;
  PROXY_STATE_STOPPED = 1;
  PROXY_STATE_STARTING = 2;
  PROXY_STATE_RUNNING = 3;
  PROXY_STATE_STOPPING = 4;
  PROXY_STATE_ERROR = 5;
}

enum PublicListenerProtocol {
  PUBLIC_LISTENER_PROTOCOL_UNSPECIFIED = 0;
  PUBLIC_LISTENER_PROTOCOL_HTTP = 1;
  PUBLIC_LISTENER_PROTOCOL_HTTPS = 2;
}

enum PublicBackendType {
  PUBLIC_BACKEND_TYPE_UNSPECIFIED = 0;
  PUBLIC_BACKEND_TYPE_PROXY_FORWARD = 1;
  PUBLIC_BACKEND_TYPE_STATIC = 2;
}

enum PublicBackendForwardMode {
  PUBLIC_BACKEND_FORWARD_MODE_UNSPECIFIED = 0;
  PUBLIC_BACKEND_FORWARD_MODE_DIRECT = 1;
  PUBLIC_BACKEND_FORWARD_MODE_AGENT_POOL = 2;
}

enum PublicBackendLoadBalancing {
  PUBLIC_BACKEND_LOAD_BALANCING_UNSPECIFIED = 0;
  PUBLIC_BACKEND_LOAD_BALANCING_ROUND_ROBIN = 1;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_ROUND_ROBIN = 2;
  PUBLIC_BACKEND_LOAD_BALANCING_RANDOM = 3;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_RANDOM = 4;
  PUBLIC_BACKEND_LOAD_BALANCING_LEAST_ACTIVE_REQUESTS = 5;
  PUBLIC_BACKEND_LOAD_BALANCING_WEIGHTED_LEAST_ACTIVE_REQUESTS = 6;
}

enum TrafficTraceLevel {
  TRAFFIC_TRACE_LEVEL_UNSPECIFIED = 0;
  TRAFFIC_TRACE_LEVEL_BASIC = 1;
  TRAFFIC_TRACE_LEVEL_DETAILED = 2;
  TRAFFIC_TRACE_LEVEL_HEADERS = 3;
  TRAFFIC_TRACE_LEVEL_DEBUG = 4;
}

enum TrafficTraceStage {
  TRAFFIC_TRACE_STAGE_UNSPECIFIED = 0;
  TRAFFIC_TRACE_STAGE_RECEIVED = 1;
  TRAFFIC_TRACE_STAGE_ROUTE_RESOLVED = 2;
  TRAFFIC_TRACE_STAGE_BACKEND_SELECTED = 3;
  TRAFFIC_TRACE_STAGE_AGENT_SELECTED = 4;
  TRAFFIC_TRACE_STAGE_UPSTREAM_STARTED = 5;
  TRAFFIC_TRACE_STAGE_UPSTREAM_RESPONDED = 6;
  TRAFFIC_TRACE_STAGE_RESPONSE_SENT = 7;
  TRAFFIC_TRACE_STAGE_FAILED = 8;
}

message AgentStatsRequest {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  string agent_public_id = 10;
}

message AgentStatsResponse {
}

message User {
  int64 id = 1;
  string username = 2;
  UserRole role = 3;
}

message GetStatusRequest {
}

message AgentStatsSnapshot {
  int64 memory_sys_mb = 1;
  int64 num_goroutine = 2;
  int64 req_success = 3;
  int64 req_client_error = 4;
  int64 req_server_error = 5;
  int64 req_internal_error = 6;
  uint64 bytes_received = 7;
  uint64 bytes_sent = 8;
  int32 active_requests = 9;
  int64 reported_at_unix_millis = 10;
}

message GetStatusResponse {
  bool proxy_running = 1;
  string proxy_last_error = 2;
  bool agent_connected = 3;
  string target_origin = 4;
  AgentStatsSnapshot latest_agent_stats = 5;
  ProxyStatus proxy = 6;
}

message ProxyStatus {
  ProxyState state = 1;
  string last_error = 2;
  int64 started_at_unix_millis = 3;
  int64 stopped_at_unix_millis = 4;
  repeated PublicListenerStatus listeners = 5;
}

message PublicBackend {
  int64 id = 1;
  string name = 2;
  string target_origin = 3;
  bool enabled = 4;
  int64 created_at_unix_millis = 5;
  int64 updated_at_unix_millis = 6;
  PublicBackendType backend_type = 7;
  bool tls_skip_verify = 8;
  int64 static_status_code = 9;
  repeated PublicHeader static_response_headers = 10;
  string static_response_body = 11;
  PublicBackendForwardMode forward_mode = 12;
  PublicBackendLoadBalancing load_balancing = 13;
  repeated PublicBackendAgent agent_assignments = 14;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 15;
  PublicBackendBasicAuth upstream_basic_auth = 16;
}

message PublicHeader {
  string name = 1;
  string value = 2;
}

message PublicBackendUpstreamHeader {
  int64 id = 1;
  int64 backend_id = 2;
  string name = 3;
  string value = 4;
  bool sensitive = 5;
  bool value_set = 6;
  int64 position = 7;
}

message PublicBackendBasicAuth {
  bool enabled = 1;
  string username = 2;
  string password = 3;
  bool password_set = 4;
}

message Agent {
  int64 id = 1;
  string public_id = 2;
  string name = 3;
  bool enabled = 4;
  bool connected = 5;
  int64 active_requests = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
  int64 last_connected_at_unix_millis = 9;
  int64 last_disconnected_at_unix_millis = 10;
  AgentStatsSnapshot latest_stats = 11;
}

message PublicBackendAgent {
  int64 backend_id = 1;
  int64 agent_id = 2;
  int64 position = 3;
  int64 weight = 4;
  bool enabled = 5;
}

message PublicListener {
  int64 id = 1;
  string name = 2;
  string bind_address = 3;
  int64 port = 4;
  PublicListenerProtocol protocol = 5;
  bool enabled = 6;
  int64 default_backend_id = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicRoute {
  int64 id = 1;
  int64 listener_id = 2;
  int64 priority = 3;
  string host_pattern = 4;
  string path_prefix = 5;
  int64 backend_id = 6;
  bool enabled = 7;
  int64 created_at_unix_millis = 8;
  int64 updated_at_unix_millis = 9;
}

message PublicTlsCertificate {
  int64 id = 1;
  int64 listener_id = 2;
  string hostname_pattern = 3;
  string cert_path = 4;
  string key_path = 5;
  bool enabled = 6;
  int64 created_at_unix_millis = 7;
  int64 updated_at_unix_millis = 8;
}

message PublicListenerStatus {
  int64 listener_id = 1;
  ProxyState state = 2;
  string last_error = 3;
  int64 started_at_unix_millis = 4;
  int64 stopped_at_unix_millis = 5;
  string bound_address = 6;
  bool running = 7;
  bool disabled = 8;
}

message GetPublicProxyConfigRequest {
}

message GetPublicProxyConfigResponse {
  repeated PublicBackend backends = 1;
  repeated PublicListener listeners = 2;
  repeated PublicRoute routes = 3;
  repeated PublicTlsCertificate tls_certificates = 4;
  ProxyStatus proxy = 5;
  repeated Agent agents = 6;
  repeated PublicBackendAgent backend_agents = 7;
}

message CreatePublicBackendRequest {
  string name = 1;
  string target_origin = 2;
  bool enabled = 3;
  PublicBackendType backend_type = 4;
  bool tls_skip_verify = 5;
  int64 static_status_code = 6;
  repeated PublicHeader static_response_headers = 7;
  string static_response_body = 8;
  PublicBackendForwardMode forward_mode = 9;
  PublicBackendLoadBalancing load_balancing = 10;
  repeated PublicBackendAgent agent_assignments = 11;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 12;
  PublicBackendBasicAuth upstream_basic_auth = 13;
}

message CreatePublicBackendResponse {
  PublicBackend backend = 1;
}

message UpdatePublicBackendRequest {
  int64 id = 1;
  string name = 2;
  string target_origin = 3;
  bool enabled = 4;
  PublicBackendType backend_type = 5;
  bool tls_skip_verify = 6;
  int64 static_status_code = 7;
  repeated PublicHeader static_response_headers = 8;
  string static_response_body = 9;
  PublicBackendForwardMode forward_mode = 10;
  PublicBackendLoadBalancing load_balancing = 11;
  repeated PublicBackendAgent agent_assignments = 12;
  repeated PublicBackendUpstreamHeader upstream_request_headers = 13;
  PublicBackendBasicAuth upstream_basic_auth = 14;
}

message UpdatePublicBackendResponse {
  PublicBackend backend = 1;
}

message DeletePublicBackendRequest {
  int64 id = 1;
}

message DeletePublicBackendResponse {
}

message CreateAgentRequest {
  string public_id = 1 [deprecated = true];
  string name = 2;
  bool enabled = 3;
}

message CreateAgentResponse {
  Agent agent = 1;
  string token = 2;
}

message UpdateAgentRequest {
  int64 id = 1;
  string public_id = 2 [deprecated = true];
  string name = 3;
  bool enabled = 4;
}

message UpdateAgentResponse {
  Agent agent = 1;
}

message DeleteAgentRequest {
  int64 id = 1;
}

message DeleteAgentResponse {
}

message RotateAgentTokenRequest {
  int64 id = 1;
}

message RotateAgentTokenResponse {
  Agent agent = 1;
  string token = 2;
}

message CreatePublicListenerRequest {
  string name = 1;
  string bind_address = 2;
  int64 port = 3;
  PublicListenerProtocol protocol = 4;
  bool enabled = 5;
  int64 default_backend_id = 6;
}

message CreatePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message UpdatePublicListenerRequest {
  int64 id = 1;
  string name = 2;
  string bind_address = 3;
  int64 port = 4;
  PublicListenerProtocol protocol = 5;
  bool enabled = 6;
  int64 default_backend_id = 7;
}

message UpdatePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message DeletePublicListenerRequest {
  int64 id = 1;
}

message DeletePublicListenerResponse {
}

message EnablePublicListenerRequest {
  int64 id = 1;
}

message EnablePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message DisablePublicListenerRequest {
  int64 id = 1;
}

message DisablePublicListenerResponse {
  PublicListener listener = 1;
  PublicListenerStatus status = 2;
  ProxyStatus proxy = 3;
}

message StartPublicListenerRequest {
  int64 id = 1;
}

message StartPublicListenerResponse {
  PublicListenerStatus status = 1;
  ProxyStatus proxy = 2;
}

message StopPublicListenerRequest {
  int64 id = 1;
}

message StopPublicListenerResponse {
  PublicListenerStatus status = 1;
  ProxyStatus proxy = 2;
}

message CreatePublicRouteRequest {
  int64 listener_id = 1;
  int64 priority = 2;
  string host_pattern = 3;
  string path_prefix = 4;
  int64 backend_id = 5;
  bool enabled = 6;
}

message CreatePublicRouteResponse {
  PublicRoute route = 1;
}

message UpdatePublicRouteRequest {
  int64 id = 1;
  int64 listener_id = 2;
  int64 priority = 3;
  string host_pattern = 4;
  string path_prefix = 5;
  int64 backend_id = 6;
  bool enabled = 7;
}

message UpdatePublicRouteResponse {
  PublicRoute route = 1;
}

message DeletePublicRouteRequest {
  int64 id = 1;
}

message DeletePublicRouteResponse {
}

message CreatePublicTlsCertificateRequest {
  int64 listener_id = 1;
  string hostname_pattern = 2;
  string cert_path = 3;
  string key_path = 4;
  bool enabled = 5;
  bytes cert_pem = 6;
  bytes key_pem = 7;
}

message CreatePublicTlsCertificateResponse {
  PublicTlsCertificate tls_certificate = 1;
}

message UpdatePublicTlsCertificateRequest {
  int64 id = 1;
  int64 listener_id = 2;
  string hostname_pattern = 3;
  string cert_path = 4;
  string key_path = 5;
  bool enabled = 6;
  bytes cert_pem = 7;
  bytes key_pem = 8;
}

message UpdatePublicTlsCertificateResponse {
  PublicTlsCertificate tls_certificate = 1;
}

message DeletePublicTlsCertificateRequest {
  int64 id = 1;
}

message DeletePublicTlsCertificateResponse {
}

message GetDashboardRequest {
}

message DashboardWindowSummary {
  string label = 1;
  int64 since_unix_millis = 2;
  int64 proxy_requests = 3;
  int64 proxy_success = 4;
  int64 proxy_client_error = 5;
  int64 proxy_server_error = 6;
  int64 proxy_internal_error = 7;
  int64 proxy_avg_duration_ms = 8;
  int64 agent_samples = 9;
  int64 agent_req_success = 10;
  int64 agent_req_client_error = 11;
  int64 agent_req_server_error = 12;
  int64 agent_req_internal_error = 13;
  uint64 agent_bytes_received = 14;
  uint64 agent_bytes_sent = 15;
  int64 agent_avg_memory_mb = 16;
  int64 agent_max_memory_mb = 17;
  int64 agent_avg_goroutines = 18;
  int64 agent_max_goroutines = 19;
}

message AgentConnectionSummary {
  bool connected = 1;
  int64 total_connections = 2;
  int64 active_connected_at_unix_millis = 3;
  int64 last_connected_at_unix_millis = 4;
  int64 last_disconnected_at_unix_millis = 5;
}

message GetDashboardResponse {
  GetStatusResponse status = 1;
  repeated DashboardWindowSummary windows = 2;
  AgentConnectionSummary agent_connections = 3;
  int64 retention_days = 4;
  int64 generated_at_unix_millis = 5;
}

message TrafficTraceSettings {
  bool enabled = 1;
  TrafficTraceLevel level = 2;
  int64 updated_at_unix_millis = 3;
  uint64 emitted_events = 4;
  uint64 dropped_events = 5;
  int64 subscriber_count = 6;
}

message GetTrafficTraceSettingsRequest {
}

message GetTrafficTraceSettingsResponse {
  TrafficTraceSettings settings = 1;
}

message SetTrafficTraceSettingsRequest {
  bool enabled = 1;
  TrafficTraceLevel level = 2;
}

message SetTrafficTraceSettingsResponse {
  TrafficTraceSettings settings = 1;
}

message StreamTrafficTraceEventsRequest {
  bool replay_recent = 1;
  uint64 after_sequence = 2;
}

message TrafficTraceEvent {
  uint64 sequence = 1;
  string request_id = 2;
  TrafficTraceStage stage = 3;
  int64 occurred_at_unix_millis = 4;
  string method = 5;
  string host = 6;
  string path = 7;
  string query = 8;
  int64 listener_id = 9;
  string listener_name = 10;
  int64 route_id = 11;
  string route_label = 12;
  bool default_route = 13;
  int64 backend_id = 14;
  string backend_name = 15;
  PublicBackendType backend_type = 16;
  PublicBackendForwardMode forward_mode = 17;
  string target_origin = 18;
  int64 agent_id = 19;
  string agent_public_id = 20;
  string agent_name = 21;
  int64 status_code = 22;
  int64 duration_ms = 23;
  string error_kind = 24;
  map<string, string> request_headers = 25;
  map<string, string> response_headers = 26;
  uint64 request_bytes = 27;
  uint64 response_bytes = 28;
  map<string, string> debug_attributes = 29;
}

message StreamTrafficTraceEventsResponse {
  TrafficTraceSettings settings = 1;
  TrafficTraceEvent event = 2;
  uint64 subscriber_dropped_events = 3;
}

message GetSetupStateRequest {
}

message GetSetupStateResponse {
  bool setup_required = 1;
  bool setup_available = 2;
  int64 setup_expires_at_unix_millis = 3;
  string setup_unavailable_reason = 4;
}

message SetupAdminRequest {
  string username = 1;
  string password = 2;
}

message SetupAdminResponse {
  User user = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
  User user = 1;
}

message LogoutRequest {
}

message LogoutResponse {
}

message GetCurrentUserRequest {
}

message GetCurrentUserResponse {
  User user = 1;
}

message StartProxyRequest {
}

message StartProxyResponse {
  ProxyStatus proxy = 1;
}

message StopProxyRequest {
}

message StopProxyResponse {
  ProxyStatus proxy = 1;
}

service AgentManagementService {
  rpc ReportStats(AgentStatsRequest) returns (AgentStatsResponse) {}
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse) {}
  rpc GetDashboard(GetDashboardRequest) returns (GetDashboardResponse) {}
  rpc GetTrafficTraceSettings(GetTrafficTraceSettingsRequest) returns (GetTrafficTraceSettingsResponse) {}
  rpc SetTrafficTraceSettings(SetTrafficTraceSettingsRequest) returns (SetTrafficTraceSettingsResponse) {}
  rpc StreamTrafficTraceEvents(StreamTrafficTraceEventsRequest) returns (stream StreamTrafficTraceEventsResponse) {}
  rpc GetSetupState(GetSetupStateRequest) returns (GetSetupStateResponse) {}
  rpc SetupAdmin(SetupAdminRequest) returns (SetupAdminResponse) {}
  rpc Login(LoginRequest) returns (LoginResponse) {}
  rpc Logout(LogoutRequest) returns (LogoutResponse) {}
  rpc GetCurrentUser(GetCurrentUserRequest) returns (GetCurrentUserResponse) {}
  rpc StartProxy(StartProxyRequest) returns (StartProxyResponse) {}
  rpc StopProxy(StopProxyRequest) returns (StopProxyResponse) {}
  rpc GetPublicProxyConfig(GetPublicProxyConfigRequest) returns (GetPublicProxyConfigResponse) {}
  rpc CreatePublicBackend(CreatePublicBackendRequest) returns (CreatePublicBackendResponse) {}
  rpc UpdatePublicBackend(UpdatePublicBackendRequest) returns (UpdatePublicBackendResponse) {}
  rpc DeletePublicBackend(DeletePublicBackendRequest) returns (DeletePublicBackendResponse) {}
  rpc CreateAgent(CreateAgentRequest) returns (CreateAgentResponse) {}
  rpc UpdateAgent(UpdateAgentRequest) returns (UpdateAgentResponse) {}
  rpc DeleteAgent(DeleteAgentRequest) returns (DeleteAgentResponse) {}
  rpc RotateAgentToken(RotateAgentTokenRequest) returns (RotateAgentTokenResponse) {}
  rpc CreatePublicListener(CreatePublicListenerRequest) returns (CreatePublicListenerResponse) {}
  rpc UpdatePublicListener(UpdatePublicListenerRequest) returns (UpdatePublicListenerResponse) {}
  rpc DeletePublicListener(DeletePublicListenerRequest) returns (DeletePublicListenerResponse) {}
  rpc EnablePublicListener(EnablePublicListenerRequest) returns (EnablePublicListenerResponse) {}
  rpc DisablePublicListener(DisablePublicListenerRequest) returns (DisablePublicListenerResponse) {}
  rpc StartPublicListener(StartPublicListenerRequest) returns (StartPublicListenerResponse) {}
  rpc StopPublicListener(StopPublicListenerRequest) returns (StopPublicListenerResponse) {}
  rpc CreatePublicRoute(CreatePublicRouteRequest) returns (CreatePublicRouteResponse) {}
  rpc UpdatePublicRoute(UpdatePublicRouteRequest) returns (UpdatePublicRouteResponse) {}
  rpc DeletePublicRoute(DeletePublicRouteRequest) returns (DeletePublicRouteResponse) {}
  rpc CreatePublicTlsCertificate(CreatePublicTlsCertificateRequest) returns (CreatePublicTlsCertificateResponse) {}
  rpc UpdatePublicTlsCertificate(UpdatePublicTlsCertificateRequest) returns (UpdatePublicTlsCertificateResponse) {}
  rpc DeletePublicTlsCertificate(DeletePublicTlsCertificateRequest) returns (DeletePublicTlsCertificateResponse) {}
}
