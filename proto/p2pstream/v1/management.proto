enum PublicPolicyMatchField {
  PUBLIC_POLICY_MATCH_FIELD_UNSPECIFIED = 0;
  PUBLIC_POLICY_MATCH_FIELD_METHOD = 1;
  PUBLIC_POLICY_MATCH_FIELD_PROTOCOL = 2;
  PUBLIC_POLICY_MATCH_FIELD_HOST = 3;
  PUBLIC_POLICY_MATCH_FIELD_PATH = 4;
  PUBLIC_POLICY_MATCH_FIELD_REMOTE_IP = 5;
  PUBLIC_POLICY_MATCH_FIELD_HEADER = 6;
  PUBLIC_POLICY_MATCH_FIELD_COOKIE = 7;
  PUBLIC_POLICY_MATCH_FIELD_QUERY_PARAM = 8;
}

enum PublicPolicyMatchConditionOperator {
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_UNSPECIFIED = 0;
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_PRESENT = 1;
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_EQUALS = 2;
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_PREFIX = 3;
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_SUFFIX = 4;
  PUBLIC_POLICY_MATCH_CONDITION_OPERATOR_CONTAINS = 5;
