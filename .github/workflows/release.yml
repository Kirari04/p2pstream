name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create, for example v0.1.0. Empty means auto-increment patch."
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Build, publish, and release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Generate code
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Check installer syntax
        run: bash -n scripts/install-agent.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run frontend unit tests
        run: cd web/management && bun test src/lib/*.test.ts

      - name: Typecheck management UI
        run: cd web/management && bun run typecheck

      - name: Build management UI
        run: cd web/management && bun run build

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail

          git fetch --tags --force
          version_input="${{ inputs.version }}"
          head_sha="$(git rev-parse HEAD)"

          if [[ -n "$version_input" ]]; then
            if [[ ! "$version_input" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Manual version must look like vX.Y.Z" >&2
              exit 1
            fi
            tag="$version_input"
          else
            existing_tag="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
            if [[ -n "$existing_tag" ]]; then
              tag="$existing_tag"
            else
              latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
              if [[ -z "$latest_tag" ]]; then
                tag="v0.1.0"
              else
                version="${latest_tag#v}"
                IFS=. read -r major minor patch <<<"$version"
                tag="v${major}.${minor}.$((patch + 1))"
              fi
            fi
          fi

          tag_exists=false
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists=true
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" != "$head_sha" ]]; then
              echo "Tag ${tag} already exists on ${tag_sha}, not current commit ${head_sha}" >&2
              exit 1
            fi
          fi

          echo "tag=${tag}" >>"$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >>"$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build Linux release assets
        shell: bash
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -Eeuo pipefail

          mkdir -p dist/assets
          for arch in amd64 arm64; do
            out_dir="dist/linux-${arch}"
            docker buildx build \
              --platform "linux/${arch}" \
              --target binary \
              --output "type=local,dest=${out_dir}" \
              .
            chmod +x "${out_dir}/p2pstream"
            tar -C "$out_dir" -czf "dist/assets/p2pstream_${TAG}_linux_${arch}.tar.gz" p2pstream
          done

          (cd dist/assets && sha256sum *.tar.gz > checksums.txt)

      - name: Build and push runtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VITE_RELEASE_REPOSITORY=${{ github.repository }}
          tags: |
            ${{ steps.image.outputs.image }}:latest
            ${{ steps.image.outputs.image }}:${{ steps.version.outputs.tag }}
            ${{ steps.image.outputs.image }}:sha-${{ steps.version.outputs.short_sha }}

      - name: Create release tag
        if: steps.version.outputs.tag_exists == 'false'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "refs/tags/${{ steps.version.outputs.tag }}"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        run: |
          set -Eeuo pipefail

          notes="Automated p2pstream release ${TAG} for commit ${SHORT_SHA}."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$notes"
            gh release upload "$TAG" dist/assets/* --clobber
          else
            gh release create "$TAG" dist/assets/* --title "$TAG" --notes "$notes"
          fi
