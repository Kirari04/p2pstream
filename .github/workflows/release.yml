name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create, for example v0.1.0. Empty means auto-increment patch."
        required: false
        type: string

permissions:
  contents: write
  packages: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    name: Verify and resolve version
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      short_sha: ${{ steps.version.outputs.short_sha }}
      tag: ${{ steps.version.outputs.tag }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Generate code
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Check installer syntax
        run: bash -n scripts/install-agent.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run frontend unit tests
        run: cd web/management && bun test src/lib/*.test.ts

      - name: Typecheck management UI
        run: cd web/management && bun run typecheck

      - name: Build management UI
        run: cd web/management && bun run build

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -Eeuo pipefail

          git fetch --tags --force
          version_input="${{ inputs.version }}"
          head_sha="$(git rev-parse HEAD)"

          if [[ -n "$version_input" ]]; then
            if [[ ! "$version_input" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "Manual version must look like vX.Y.Z" >&2
              exit 1
            fi
            tag="$version_input"
          else
            existing_tag="$(git tag --points-at HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
            if [[ -n "$existing_tag" ]]; then
              tag="$existing_tag"
            else
              latest_tag="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1 || true)"
              if [[ -z "$latest_tag" ]]; then
                tag="v0.1.0"
              else
                version="${latest_tag#v}"
                IFS=. read -r major minor patch <<<"$version"
                tag="v${major}.${minor}.$((patch + 1))"
              fi
            fi
          fi

          tag_exists=false
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            tag_exists=true
            tag_sha="$(git rev-list -n 1 "$tag")"
            if [[ "$tag_sha" != "$head_sha" ]]; then
              echo "Tag ${tag} already exists on ${tag_sha}, not current commit ${head_sha}" >&2
              exit 1
            fi
          fi

          echo "tag=${tag}" >>"$GITHUB_OUTPUT"
          echo "tag_exists=${tag_exists}" >>"$GITHUB_OUTPUT"
          echo "short_sha=${GITHUB_SHA::7}" >>"$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY,,}" >>"$GITHUB_OUTPUT"

  binary:
    if: github.ref == 'refs/heads/main'
    name: Build Linux ${{ matrix.arch }} binary
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Build binary
        shell: bash
        env:
          TAG: ${{ needs.verify.outputs.tag }}
          ARCH: ${{ matrix.arch }}
          SOURCE_REPOSITORY: ${{ github.repository }}
        run: |
          set -Eeuo pipefail
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X p2pstream/internal/buildinfo.Version=${TAG} -X p2pstream/internal/buildinfo.Commit=${GITHUB_SHA} -X p2pstream/internal/buildinfo.Repository=${SOURCE_REPOSITORY}" -o dist/p2pstream main.go
          chmod +x dist/p2pstream
          VERSION="${TAG}" COMMIT="${GITHUB_SHA}" SOURCE_REPOSITORY="${SOURCE_REPOSITORY}" make legal-notices
          mkdir -p dist/package
          cp dist/p2pstream dist/package/p2pstream
          cp -R dist/legal/. dist/package/
          tar -C dist/package -czf "p2pstream_${TAG}_linux_${ARCH}.tar.gz" .

      - name: Upload binary archive
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-${{ matrix.arch }}
          path: p2pstream_${{ needs.verify.outputs.tag }}_linux_${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  image:
    if: github.ref == 'refs/heads/main'
    name: Build Linux ${{ matrix.arch }} image
    needs: verify
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          platforms: linux/${{ matrix.arch }}
          push: true
          build-args: |
            VERSION=${{ needs.verify.outputs.tag }}
            COMMIT=${{ github.sha }}
            SOURCE_REPOSITORY=${{ github.repository }}
            VITE_RELEASE_REPOSITORY=${{ github.repository }}
            VITE_RELEASE_REF=${{ needs.verify.outputs.tag }}
          tags: |
            ${{ needs.verify.outputs.image }}:${{ needs.verify.outputs.tag }}-linux-${{ matrix.arch }}
            ${{ needs.verify.outputs.image }}:sha-${{ needs.verify.outputs.short_sha }}-linux-${{ matrix.arch }}

  publish:
    if: github.ref == 'refs/heads/main'
    name: Publish release
    needs:
      - verify
      - binary
      - image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download binary archives
        uses: actions/download-artifact@v8
        with:
          pattern: binary-linux-*
          path: dist/artifacts

      - name: Prepare release assets
        shell: bash
        env:
          TAG: ${{ needs.verify.outputs.tag }}
        run: |
          set -Eeuo pipefail
          mkdir -p dist/assets
          find dist/artifacts -type f -name '*.tar.gz' -exec cp {} dist/assets/ \;
          git archive --format=tar.gz --prefix="p2pstream-${TAG}/" -o "dist/assets/p2pstream_${TAG}_source.tar.gz" HEAD
          (cd dist/assets && sha256sum *.tar.gz > checksums.txt)

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Publish multi-arch image tags
        shell: bash
        env:
          IMAGE: ${{ needs.verify.outputs.image }}
          TAG: ${{ needs.verify.outputs.tag }}
          SHORT_SHA: ${{ needs.verify.outputs.short_sha }}
        run: |
          set -Eeuo pipefail
          docker buildx imagetools create \
            -t "${IMAGE}:latest" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:sha-${SHORT_SHA}" \
            "${IMAGE}:${TAG}-linux-amd64" \
            "${IMAGE}:${TAG}-linux-arm64"

      - name: Create release tag
        if: needs.verify.outputs.tag_exists == 'false'
        shell: bash
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.verify.outputs.tag }}" -m "Release ${{ needs.verify.outputs.tag }}"
          git push origin "refs/tags/${{ needs.verify.outputs.tag }}"

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          SHORT_SHA: ${{ needs.verify.outputs.short_sha }}
        run: |
          set -Eeuo pipefail

          printf -v notes '%s\n\n%s' \
            "Automated p2pstream release ${TAG} for commit ${SHORT_SHA}." \
            "p2pstream is licensed under AGPL-3.0-or-later. Corresponding source is available in the p2pstream_${TAG}_source.tar.gz release asset and from the matching Git tag."
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TAG" --notes "$notes"
            gh release upload "$TAG" dist/assets/* --clobber
          else
            gh release create "$TAG" dist/assets/* --title "$TAG" --notes "$notes"
          fi
