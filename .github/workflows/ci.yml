name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.18

      - name: Generate code
        run: make generate

      - name: Verify generated files are committed
        run: git diff --exit-code

      - name: Check installer syntax
        run: bash -n scripts/install-agent.sh

      - name: Run Go tests
        run: go test ./...

      - name: Run Go vet
        run: go vet ./...

      - name: Run frontend unit tests
        run: cd web/management && bun test src/lib/*.test.ts

      - name: Typecheck management UI
        run: cd web/management && bun run typecheck

      - name: Build management UI
        run: cd web/management && bun run build

      - name: Build runtime image
        run: docker build --target runtime -t p2pstream:ci .
